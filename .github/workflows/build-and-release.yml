name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Verify APK build
        run: |
          if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ] && [ ! -f "build/app/outputs/apk/release/app-release.apk" ]; then
            echo "APK not found in expected locations. Checking all APK files..."
            find build -name "*.apk" -type f || echo "No APK files found"
            exit 1
          fi

      - name: Build Web
        run: flutter build web --release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/web
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/serviq.apk
          cp -r build/web/* artifacts/web/

      - name: Generate version info
        id: version
        run: |
          VERSION=$(grep "version:" pubspec.yaml | head -1 | cut -d' ' -f2 | cut -d'+' -f1)
          BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}-${{ steps.version.outputs.COMMIT_SHA }}
          name: "Release v${{ steps.version.outputs.VERSION }} - ${{ steps.version.outputs.BUILD_DATE }}"
          files: |
            artifacts/serviq.apk
          body: |
            ## 📱 Serviq v${{ steps.version.outputs.VERSION }}

            **Build Date:** ${{ steps.version.outputs.BUILD_DATE }}
            **Commit:** ${{ steps.version.outputs.COMMIT_SHA }}

            ### 📥 Downloads
            - **Android APK** - Install on Android devices directly
            - **Web Build** - Artifacts available in workflow outputs

            ### 📖 Installation Instructions

            #### Android:
            1. Download the `.apk` file from this release
            2. Transfer it to your Android device
            3. Enable "Unknown sources" in Settings > Security
            4. Open the APK file and install

            #### Web:
            - The web build is available as workflow artifacts
            - Can be deployed to GitHub Pages or any web server

            ---
            Generated by CI/CD Pipeline
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: artifacts/web/
          retention-days: 30
          compression-level: 6

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: artifacts/serviq.apk
          retention-days: 30
          compression-level: 0
