name: serviq
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.3.0
  flutter_web_plugins:
    sdk: flutter
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  intl: ^0.20.2
  lottie: ^3.3.3
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  state_notifier: ^1.0.0
  supabase_flutter: ^2.12.4
  freezed_annotation: ^3.1.0
  crypto: ^3.0.3
  permission_handler: ^11.0.0
  geolocator: ^11.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: any
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3
  freezed: any
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F8F9FA"
  image: "assets/images/logo.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/fonts/
